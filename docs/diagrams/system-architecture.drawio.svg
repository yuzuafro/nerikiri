<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <style>
      .title { font: 700 20px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #1f2937; }
      .label { font: 600 18px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #111827; }
      .text { font: 14px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 2; rx: 8; }
      .container { fill: #f9fafb; stroke: #111827; stroke-width: 2; rx: 12; }
      .arrow { stroke: #4b5563; stroke-width: 2.5; marker-end: url(#mArrow); fill: none; }
    </style>
    <marker id="mArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect class="container" x="20" y="20" width="1160" height="380"/>
  <text class="title" x="40" y="52">ブラウザ</text>

  <rect class="box" x="70" y="120" width="220" height="150"/>
  <text class="label" x="90" y="152">UI層</text>
  <text class="text" x="90" y="182">Toolbar</text>
  <text class="text" x="90" y="206">(DOM)</text>

  <rect class="box" x="360" y="120" width="250" height="150"/>
  <text class="label" x="380" y="152">アプリ層</text>
  <text class="text" x="380" y="182">App</text>
  <text class="text" x="380" y="206">SculptController</text>

  <rect class="box" x="680" y="120" width="320" height="150"/>
  <text class="label" x="700" y="152">コア層 (純ロジック)</text>
  <text class="text" x="700" y="182">geometry / brushes</text>
  <text class="text" x="700" y="206">history / serialize</text>

  <rect class="box" x="430" y="300" width="230" height="80"/>
  <text class="label" x="450" y="332">描画層</text>
  <text class="text" x="450" y="356">ClayScene (Three.js / WebGL)</text>

  <line class="arrow" x1="290" y1="165" x2="360" y2="165"/>
  <line class="arrow" x1="360" y1="225" x2="290" y2="225"/>
  <line class="arrow" x1="610" y1="165" x2="680" y2="165"/>
  <line class="arrow" x1="680" y1="225" x2="610" y2="225"/>
  <line class="arrow" x1="485" y1="270" x2="485" y2="300"/>
  <line class="arrow" x1="575" y1="300" x2="575" y2="270"/>
</svg>
